---
# yamllint disable rule:line-length

# Title of the workflow.
name: Behat

# Run this workflow every time a new commit pushed to your repository or PR created.
# yamllint disable-line rule:truthy
on: [push, pull_request]

jobs:
  # Set the job key. The key is displayed as the job name
  # when a job name is not provided.
  test:
    # Virtual environment to use.
    runs-on: ubuntu-22.04

    # Determines build matrix.
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      # Check out this repository code in ./plugin directory
      - name: Check out repository code
        uses: actions/checkout@v3

      # Install PHP of required version. For possible options see https://github.com/shivammathur/setup-php
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      # Setup Chromedriver.
      #- name: Setup Chromedriver
      #  uses: nanasess/setup-chromedriver@v2

      # Initialise Chromium.
      - name: Installe Chromium
        run: |
          sudo apt install -y chromium-chromedriver
          /usr/bin/chromium --disable-gpu --headless --remote-debugging-address=localhost --remote-debugging-port=9222  --disable-extensions --temp-profile --no-sandbox &

      # Initialise composer.
      - name: Initialise composer
        run: |
          cp distribution/config.php .
          composer install

      # Run server.
      - name: Local development server.
        run: |
          ls -lha
          php -S 0.0.0.0:8080 -t www &

      # Run behat.
      - name: Run behat.
        uses: php-actions/behat@v1
        with:
          config: .behat.yml
